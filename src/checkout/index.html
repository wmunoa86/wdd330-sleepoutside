<!doctype html>

<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sleep Outside | Checkout</title>
    <link rel="stylesheet" href="/css/style.css" />
    <script src="/js/checkout.js" type="module"></script>
  </head>

  <body>
    <header id="main-header" class="divider"></header>

    <main>
      <section class="checkout">
        <h2>Review &amp; Place your Order</h2>

        <p class="error-message"></p>

        <form id="checkout-form" novalidate>
          <fieldset class="checkout-section">
            <legend>Customer Information</legend>
            <label for="fname">First Name</label>
            <input
              type="text"
              id="fname"
              name="fname"
              placeholder="Jane"
              required
            />
            <label for="lname">Last Name</label>
            <input
              type="text"
              id="lname"
              name="lname"
              placeholder="Doe"
              required
            />
          </fieldset>

          <fieldset class="checkout-section">
            <legend>Shipping Address</legend>
            <label for="street">Street</label>
            <input
              type="text"
              id="street"
              name="street"
              placeholder="123 Main St"
              required
            />
            <label for="city">City</label>
            <input
              type="text"
              id="city"
              name="city"
              placeholder="Springfield"
              required
            />
            <label for="state">State</label>
            <input
              type="text"
              id="state"
              name="state"
              placeholder="UT"
              maxlength="2"
              required
            />
            <label for="zip">Zip Code</label>
            <input
              type="text"
              id="zip"
              name="zip"
              placeholder="84601"
              required
            />
          </fieldset>

          <fieldset class="checkout-section">
            <legend>Payment Information</legend>
            <label for="cardNumber">Card Number</label>
            <input
              type="text"
              id="cardNumber"
              name="cardNumber"
              placeholder="1234 5678 9012 3456"
              required
            />
            <label for="expiration">Expiration Date</label>
            <input
              type="text"
              id="expiration"
              name="expiration"
              placeholder="MM/YY"
              required
            />
            <label for="code">Security Code</label>
            <input
              type="text"
              id="code"
              name="code"
              placeholder="123"
              maxlength="4"
              required
            />
          </fieldset>

          <div class="order-summary checkout-section">
            <h3>Order Summary</h3>
            <p>
              <span>Item Subtotal:</span>
              <span class="cart-subtotal">$0.00</span>
            </p>
            <p>
              <span>Shipping:</span>
              <span class="cart-shipping">$0.00</span>
            </p>
            <p>
              <span>Tax (6%):</span>
              <span class="cart-tax">$0.00</span>
            </p>
            <p class="order-total-line">
              <span>Order Total:</span>
              <span class="cart-total">$0.00</span>
            </p>
          </div>

          <button type="submit">Place Order</button>
        </form>
      </section>
    </main>

    <footer id="main-footer"></footer>
  </body>
</html>
