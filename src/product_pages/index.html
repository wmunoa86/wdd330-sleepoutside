<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sleep Outside | Product</title>
    <link rel="stylesheet" href="/css/style.css" />
</head>

<body>
    <header class="divider" id="main-header"></header>
    <main class="divider">
        <section class="product-detail">
            <img src="" alt="" />
            <div class="product-detail__info">
                <h3 class="card__brand"></h3>
                <h2 class="card__name"></h2>
                <p class="product-card__price"></p>
                <ul class="product__colors"></ul>
                <p class="product-card__description"></p>
                <button id="addToCart" data-id="">Add to Cart</button>
            </div>
        </section>

        <section class="comments">
            <h2>Customer Comments</h2>
            <form id="comment-form">
                <div class="comment-form__field">
                    <label for="comment-name">Name</label>
                    <input type="text" id="comment-name" name="name" required />
                </div>
                <div class="comment-form__field">
                    <label for="comment-text">Comment</label>
                    <textarea id="comment-text" name="comment" required></textarea>
                </div>
                <button type="submit">Post Comment</button>
            </form>
            <ul class="comment-list"></ul>
        </section>
    </main>
    <footer id="main-footer"></footer>
    <script type="module" src="/js/product.js"></script>
</body>

</html>
